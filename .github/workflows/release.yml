name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.1-alpha)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Assemble release artifacts
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace --no-daemon

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release-unsigned.apk "dist/CanvasLauncher-${{ steps.release_meta.outputs.tag }}-unsigned.apk"
          cp app/build/outputs/bundle/release/app-release.aab "dist/CanvasLauncher-${{ steps.release_meta.outputs.tag }}.aab"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Canvas Launcher ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.release_meta.outputs.tag, 'alpha') || contains(steps.release_meta.outputs.tag, 'beta') || contains(steps.release_meta.outputs.tag, 'rc') }}
          fail_on_unmatched_files: true
          files: |
            dist/*

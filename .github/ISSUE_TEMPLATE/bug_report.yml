name: Bug report
description: Report a reproducible problem in Canvas Launcher
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short and clear bug description
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide deterministic steps
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stacktrace / screenshots
      description: Paste any relevant outputs
      render: shell

  - type: input
    id: app_version
    attributes:
      label: App version / commit
      placeholder: e.g. main @ abc1234

  - type: input
    id: android_version
    attributes:
      label: Android version
      placeholder: e.g. Android 14

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: e.g. Pixel 8

  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I can reproduce this issue on the latest `main`
          required: false
